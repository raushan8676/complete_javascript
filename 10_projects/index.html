            padding: 0;
            margin: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7ff, #e8ecff);

        }

        nav {
            padding: 20px;

            padding: 0 20px;

            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);

        }

        .project:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
        }

        .project h2 {
            text-align: center;
            color: #4338ca;
            font-size: 1.2rem;
        }

        a {

        }
